drawcustom:
  name: Draw custom elements
  description: Draw arbitrary graphics elements onto the OLED framebuffer and flush once.
  fields:
    clear:
      name: Clear display first
      description: Clear the display before drawing elements.
      required: false
      default: true
      selector:
        boolean:
    payload:
      name: Payload
      description: OpenDisplay-like list of draw elements (text, multiline, line, rectangle, filled_rectangle, dlimg, pixel).
      required: true
      example:
        - type: text
          x: 0
          y: 0
          value: Home Assistant
          size: 12
        - type: line
          x_start: 0
          y_start: 14
          x_end: 127
          y_end: 14
      selector:
        object:

clear:
  name: Clear display
  description: Clear the OLED screen.

show_logo:
  name: Show startup splash
  description: Show the default Home Assistant splash screen.
