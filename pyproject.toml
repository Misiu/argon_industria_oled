[tool.ruff]
target-version = "py314"
line-length = 100
src = ["custom_components"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "C4", "SIM", "RUF"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"
show_error_codes = true
pretty = true
warn_unused_configs = true
check_untyped_defs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
  "homeassistant.*",
  "voluptuous.*",
  "PIL.*",
  "smbus2",
  "gpiod",
  "gpiod.line",
]
ignore_missing_imports = true

[tool.pylint."MESSAGES CONTROL"]
disable = [
  "invalid-name",
  "too-few-public-methods",
]

[tool.pylint.DESIGN]
max-attributes = 8

[tool.pylint.TYPECHECK]
# pylint cannot install homeassistant>=2026.x to verify names like
# AddConfigEntryEntitiesCallback that were added after the latest
# PyPI-installable release. Ignore all homeassistant module imports.
ignored-modules = ["homeassistant"]
