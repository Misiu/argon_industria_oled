name: Release actions

on:
  release:
    types: [published]

jobs:
  release_zip_file:
    name: Prepare release asset
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get version
        id: version
        uses: home-assistant/actions/helpers/version@master
      
      - name: ZIP files
        run: |
          echo "Workspace directory: $(pwd)"
          echo "Top-level contents:"
          ls -al
          echo "Component directory contents before packaging:"
          ls -al custom_components/argon_industria_oled
          sed -i 's/v0.0.0/${{ steps.version.outputs.version }}/' custom_components/argon_industria_oled/manifest.json
          cd custom_components/argon_industria_oled
          echo "Packaging from directory: $(pwd)"
          echo "Files to include:"
          ls -al
          zip argon_industria_oled.zip -r ./

      - name: Log packaged asset
        run: |
          echo "Workspace directory before upload: $(pwd)"
          echo "Top-level contents before upload:"
          ls -al
          echo "Component directory contents before upload:"
          ls -al custom_components/argon_industria_oled
          echo "Target tag for upload: ${{ github.ref }}"

      - name: Upload zip to release
        uses: svenstaro/upload-release-action@2.11.2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: custom_components/argon_industria_oled/argon_industria_oled.zip
          asset_name: argon_industria_oled.zip
          tag: ${{ github.ref }}
          overwrite: true
